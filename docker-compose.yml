# The whole portfolio running together: the auth service (with its Postgres), the mail service
# (delivering through Mailpit, whose web UI at http://localhost:8025 shows every mail sent), the
# meme service (gallery UI at :8083), the comments service (with a Postgres of its own) and Kafka
# as the event backbone (mail requests from the outbox, the account-deletion saga, the
# MEME_DELETED thread cascade). Jars are built on the host first — use ./infra-up.sh, then
# ./infra-smoke.sh to prove the flows end to end.
#
# Ports on the host:
#   8080  microservice-security  (register/authenticate/verify-email/...)
#   8082  microservice-email     (POST /mails*, X-Api-Key required)
#   8083  microservice-memes     (gallery UI at /; uploads/votes need signing in)
#   8085  microservice-comments  (comment threads + comment votes)
#   8086  microservice-paddock   (the social hub: servers, people, events; PWA at /)
#   8092  microservice-user-collections (Helidon SE; a user's saved refs; saga participant)
#   ----  sms / push             (internal: paddock notification channels; stub-send by default)
#   ----  image-encoder          (internal: PNG->WebP for memes; Python + Pillow)
#   8084  formula-simulator      (F1 manager: race control UI at /, SSE race broadcast)
#   ----  race-sim               (internal: Python race module — engine code never faces the
#                                 network; only the JWT-gated game talks to it. The owner's
#                                 manual drive UI needs docker-compose.dev.yml — formula-up.sh)
#   8091  idp                    (stub OIDC provider: social login without Google)
#   8025  Mailpit web UI         (the "inbox" for verification/reset links)

# The OpenTelemetry Java agent, attached to each JVM service through JAVA_TOOL_OPTIONS (no image
# rebuild) — it auto-instruments HTTP and Kafka and exports trace spans to Tempo. Per service, add
# `<<: *otel-agent` to its environment plus its own OTEL_SERVICE_NAME, and mount the agent jar.
x-otel-agent: &otel-agent
  JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: none    # metrics already flow through Prometheus scraping
  OTEL_LOGS_EXPORTER: none       # logs already flow through Promtail -> Loki

services:
  security:
    build:
      context: microservice-security
      dockerfile: security-infrastructure/Dockerfile
    ports:
      - "8080:8080"
    environment:
      <<: *otel-agent
      OTEL_SERVICE_NAME: security
      MICRONAUT_ENVIRONMENTS: dev
      DB_HOST: postgres
      DB_NAME: security
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      # mails leave as events: transactional outbox -> Kafka -> microservice-email
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # links as they appear in the mails: the verify link opens the gallery UI, which POSTs the
      # token to /verify-email (a bare GET on the API would be 405 — and side effects on GET invite
      # mail-client prefetchers to consume tokens). No reset UI yet, so that link stays raw.
      VERIFY_LINK_BASE: http://localhost:8083/?verify=
      RESET_LINK_BASE: http://localhost:8080/reset-password?token=
      # the per-IP registration throttle (default 5/15min) would trip on the smoke test, which
      # registers a handful of accounts from one host in minutes — keep the guard on, but roomy
      SECURITY_REGISTRATION_MAX_PER_WINDOW: "100"
      # social login: the provider named "google" points at the stub IdP here; production swaps
      # these URLs/credentials for the real thing and the dance never changes. authorize-url is
      # what the BROWSER visits (host-published port), token/userinfo are called server-side.
      SECURITY_OAUTH_PROVIDERS_GOOGLE_ISSUER: http://localhost:8091
      SECURITY_OAUTH_PROVIDERS_GOOGLE_AUTHORIZE_URL: http://localhost:8091/authorize
      SECURITY_OAUTH_PROVIDERS_GOOGLE_TOKEN_URL: http://idp:8091/token
      SECURITY_OAUTH_PROVIDERS_GOOGLE_CLIENT_ID: demo-client
      SECURITY_OAUTH_PROVIDERS_GOOGLE_CLIENT_SECRET: ${IDP_CLIENT_SECRET:-demo-secret}
      SECURITY_OAUTH_PROVIDERS_GOOGLE_REDIRECT_URI: http://localhost:8080/oauth/callback
      # second provider on the SAME stub, exercising the USERINFO identity source (the shape of
      # Facebook/GitHub: no id_token trusted — the access token is spent on GET /userinfo)
      SECURITY_OAUTH_PROVIDERS_GITHUB_IDENTITY_SOURCE: USERINFO
      SECURITY_OAUTH_PROVIDERS_GITHUB_AUTHORIZE_URL: http://localhost:8091/authorize
      SECURITY_OAUTH_PROVIDERS_GITHUB_TOKEN_URL: http://idp:8091/token
      SECURITY_OAUTH_PROVIDERS_GITHUB_USERINFO_URL: http://idp:8091/userinfo
      SECURITY_OAUTH_PROVIDERS_GITHUB_CLIENT_ID: demo-client
      SECURITY_OAUTH_PROVIDERS_GITHUB_CLIENT_SECRET: ${IDP_CLIENT_SECRET:-demo-secret}
      SECURITY_OAUTH_PROVIDERS_GITHUB_REDIRECT_URI: http://localhost:8080/oauth/callback
      SECURITY_OAUTH_PROVIDERS_GITHUB_LABEL: GitHub
      SECURITY_OAUTH_ALLOWED_RETURN_PREFIXES: http://localhost:8083/,http://localhost:8084/
      # MFA SMS factor delivers codes through the shared SMS channel service (internal)
      SECURITY_SMS_URL: http://sms:8088
    # Readiness, not just "process started": a JVM binds its port at the end of startup, and the
    # temurin/python images ship no curl — so the probe is a bare TCP connect (bash /dev/tcp or a
    # python socket). Dependents wait on service_healthy instead of racing a service mid-boot.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s
    volumes:
      - ./observability/otel:/otel:ro   # the OpenTelemetry agent (JAVA_TOOL_OPTIONS above)
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  email:
    build:
      context: microservice-email
    ports:
      - "8082:8080"
    environment:
      <<: *otel-agent
      OTEL_SERVICE_NAME: email
      MAIL_API_KEY: ${MAIL_API_KEY:-local-dev-key}
      QUARKUS_MAILER_HOST: mailpit
      QUARKUS_MAILER_PORT: "1025"
      QUARKUS_MAILER_MOCK: "false"
      # the prod profile defaults to STARTTLS=REQUIRED (real submission endpoints); Mailpit
      # speaks plain SMTP only, so the local stack opts out explicitly
      MAIL_SMTP_START_TLS: DISABLED
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s
    volumes:
      - ./observability/otel:/otel:ro   # the OpenTelemetry agent (JAVA_TOOL_OPTIONS above)
    depends_on:
      mailpit:
        condition: service_started
      kafka:
        condition: service_healthy

  memes:
    build:
      context: microservice-memes
    ports:
      - "8083:8083"
    environment:
      <<: *otel-agent
      OTEL_SERVICE_NAME: memes
      # writes require a bearer token that security confirms; reads (and the UI at :8083) are public
      SECURITY_URL: http://security:8080
      # the gallery is durable: metadata and image bytes in its own Postgres
      DB_URL: jdbc:postgresql://memes-postgres:5432/memes
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      # account-deletion saga (memes axis) + MEME_DELETED announcements for the comments service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      # smaller WebP to clients that accept it; if the encoder is down, PNG is still served
      IMAGE_ENCODER_URL: http://image-encoder:8087
      # image bytes live in object storage (MinIO speaks S3); metadata stays in Postgres
      MEMES_BLOB_STORE: s3
      MEMES_S3_ENDPOINT: http://minio:9000
      MEMES_S3_BUCKET: memes
      MEMES_S3_ACCESS_KEY: memes
      MEMES_S3_SECRET_KEY: ${MINIO_PASSWORD:-supersecret}
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8083"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s
    volumes:
      - ./observability/otel:/otel:ro   # the OpenTelemetry agent (JAVA_TOOL_OPTIONS above)
    depends_on:
      memes-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      security:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # object storage for the gallery's image bytes — the S3 ObjectStore adapter's home
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    restart: always
    command: server /data
    environment:
      MINIO_ROOT_USER: memes
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-supersecret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  image-encoder:
    build:
      context: microservice-image
    # internal only — memes calls it; not published to the host
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8087), 2)"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 5s

  # stub OIDC provider: "Sign in with Google" without Google. The browser visits its authorize
  # form on the published port; security exchanges codes with it service-to-service.
  idp:
    build:
      context: microservice-idp
    ports:
      - "8091:8091"   # 8090 belongs to the race sim
    environment:
      PORT: "8091"
      IDP_ISSUER: http://localhost:8091
      IDP_CLIENT_ID: demo-client
      IDP_CLIENT_SECRET: ${IDP_CLIENT_SECRET:-demo-secret}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8091), 2)"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 5s

  memes-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: memes
    volumes:
      - memes_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memes"]
      interval: 3s
      timeout: 3s
      retries: 15

  comments:
    build:
      context: microservice-comments
    ports:
      - "8085:8085"
    environment:
      <<: *otel-agent
      OTEL_SERVICE_NAME: comments
      DB_URL: jdbc:postgresql://comments-postgres:5432/comments
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SECURITY_URL: http://security:8080
      # the offline trade-off on display: comments verifies security's JWTs against its JWKS
      # instead of calling /me (memes keeps introspection — instant revocation awareness)
      SECURITY_VERIFY: offline
      MEMES_URL: http://memes:8083
      # account-deletion saga (comments axis) + the MEME_DELETED thread cascade
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8085"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s
    volumes:
      - ./observability/otel:/otel:ro   # the OpenTelemetry agent (JAVA_TOOL_OPTIONS above)
    depends_on:
      comments-postgres:
        condition: service_healthy
      security:
        condition: service_healthy
      kafka:
        condition: service_healthy

  comments-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: comments
    volumes:
      - comments_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comments"]
      interval: 3s
      timeout: 3s
      retries: 15

  paddock:
    build:
      context: microservice-paddock
    ports:
      - "8086:8086"
    environment:
      <<: *otel-agent
      OTEL_SERVICE_NAME: paddock
      # the social hub: your servers, their live campaign state, upcoming events (PWA at :8086)
      DB_URL: jdbc:postgresql://paddock-postgres:5432/paddock
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SECURITY_URL: http://security:8080
      SECURITY_VERIFY: offline
      # notification channels — each its own service; a blank URL disables that channel.
      # email listens on 8080 inside the network (8082 is only the host-published port)
      EMAIL_URL: http://email:8080
      EMAIL_API_KEY: ${MAIL_API_KEY:-local-dev-key}
      SMS_URL: http://sms:8088
      PUSH_URL: http://push:8089
    healthcheck:
      # alpine image: busybox nc, not bash /dev/tcp
      test: ["CMD", "nc", "-z", "localhost", "8086"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s
    volumes:
      - ./observability/otel:/otel:ro   # the OpenTelemetry agent (JAVA_TOOL_OPTIONS above)
    depends_on:
      paddock-postgres:
        condition: service_healthy
      security:
        condition: service_healthy
      sms:
        condition: service_healthy
      push:
        condition: service_healthy

  sms:
    build:
      context: microservice-sms
    # internal only — the paddock fans out to it; stub-sends unless SMS_PROVIDER is set
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8088), 2)"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 5s

  push:
    build:
      context: microservice-push
    # internal only — the paddock fans out to it; stub-sends unless PUSH_PROVIDER is set
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8089), 2)"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 5s

  paddock-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: paddock
    volumes:
      - paddock_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paddock"]
      interval: 3s
      timeout: 3s
      retries: 15

  # the sixth flavour: Helidon 4 SE on virtual threads. The user's saved refs (favourites etc.);
  # the third participant in the account-deletion saga (consumes content-commands, confirms on
  # usercollections-events). Offline JWT like comments; its own Postgres.
  user-collections:
    build:
      context: microservice-user-collections
    ports:
      - "8092:8092"
    environment:
      <<: *otel-agent
      OTEL_SERVICE_NAME: user-collections
      COLLECTIONS_PORT: "8092"
      DB_URL: jdbc:postgresql://collections-postgres:5432/collections
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SECURITY_URL: http://security:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      # alpine image: busybox nc, not bash /dev/tcp
      test: ["CMD", "nc", "-z", "localhost", "8092"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 10s
    volumes:
      - ./observability/otel:/otel:ro   # the OpenTelemetry agent (JAVA_TOOL_OPTIONS above)
    depends_on:
      collections-postgres:
        condition: service_healthy
      security:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # the favourites UI on its OWN origin (react-native-web built by Vite, served by nginx) — the
  # browser then calls security and user-collections cross-origin, exercising their CORS edges
  collections-ui:
    build:
      context: microservice-user-collections/collections-ui
    ports:
      - "8093:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  collections-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: collections
    volumes:
      - collections_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collections"]
      interval: 3s
      timeout: 3s
      retries: 15

  formula:
    build:
      context: formula-simulator
    ports:
      - "8084:8084"
    environment:
      <<: *otel-agent
      OTEL_SERVICE_NAME: formula
      RACE_SIM_URL: http://race-sim:8090
      # game actions (start race, orders, R&D, era, homologate) require a security-confirmed token
      SECURITY_URL: http://security:8080
      SECURITY_VERIFY: offline
      # durable game state (seasons, standings, developed cars) survives restarts
      DB_URL: jdbc:postgresql://formula-postgres:5432/formula
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - ./observability/otel:/otel:ro   # the OpenTelemetry agent (JAVA_TOOL_OPTIONS above)
    depends_on:
      race-sim:
        condition: service_started
      security:
        condition: service_healthy
      formula-postgres:
        condition: service_healthy

  formula-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: formula
    volumes:
      - formula_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d formula"]
      interval: 3s
      timeout: 3s
      retries: 15

  race-sim:
    build:
      # repo-root context: the image also ships tracks/ (incident replays draw from it)
      context: formula-simulator
      dockerfile: sim/race/Dockerfile
    # NO host port (A4): the sim carries the engine's secrets, so it lives on the internal
    # network only — the public face is the game (JWT). Dev drive-ui: docker-compose.dev.yml.
    environment:
      # A2: the exam's hard wall-clock limit — a hostile bot cannot hold the examiner hostage
      FORMULA_EXAM_TIMEOUT_SEC: "900"
      # A3: exam verdicts cached by file sha — the same bytes never mill twice (the cache is
      # opt-in precisely so the TEST suite keeps re-milling; production wants it on)
      FORMULA_EXAM_CACHE: "1"

  kafka:
    # single-node KRaft — the event backbone (mail requests, the deletion saga, thread cascades)
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 15s

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"   # web UI; SMTP (1025) stays internal

  # --- observability: metrics without touching a single service (owner's ask, 2026-07-07).
  # cAdvisor sees every container, node-exporter the host, Prometheus scrapes both and
  # Grafana comes provisioned (datasource + "Stack — kontenery" dashboard, anonymous admin
  # for dev). Per-service /metrics endpoints join observability/prometheus.yml as the
  # sub-repos grow them.
  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    ports:
      - "9090:9090"

  # logs, the third pillar: Loki stores, Promtail ships every container's stdout (discovered via
  # the Docker socket — no per-service config). In Grafana, {service="..."} |= "<cid>" greps one
  # correlation id across all services at once — the payoff of the X-Correlation-Id that now rides
  # the HTTP edge and the Kafka headers.
  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.1.0
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  # traces, the third signal: the OpenTelemetry Java agent (attached to the JVM services below via
  # JAVA_TOOL_OPTIONS, no image rebuild) exports OTLP here; Grafana shows the span waterfall. The
  # agent propagates W3C trace context over HTTP AND Kafka, so a request's trace spans the whole
  # saga. The agent jar is fetched by ./infra-up.sh into observability/otel (gitignored, 21 MB).
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API (Grafana queries this)
      - "4318:4318"   # OTLP/HTTP receiver

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      # anonymous admin is a DEV default; a public deployment flips GRAFANA_ANON=false
      # and sets GRAFANA_ADMIN_PASSWORD
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANON:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_ANON:-true}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command: ["--path.rootfs=/host"]
    pid: host
    volumes:
      - /:/host:ro,rslave

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: security
    volumes:
      - security_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d security"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  security_pgdata:
  memes_pgdata:
  minio_data:
  paddock_pgdata:
  comments_pgdata:
  formula_pgdata:
  collections_pgdata:
  loki_data:
  tempo_data:

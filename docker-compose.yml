# The whole portfolio running together: the auth service (with its Postgres), the mail service
# (delivering through Mailpit, whose web UI at http://localhost:8025 shows every mail sent), the
# meme service (gallery UI at :8083), the comments service (with a Postgres of its own) and Kafka
# as the event backbone (mail requests from the outbox, the account-deletion saga, the
# MEME_DELETED thread cascade). Jars are built on the host first — use ./infra-up.sh, then
# ./infra-smoke.sh to prove the flows end to end.
#
# Ports on the host:
#   8080  microservice-security  (register/authenticate/verify-email/...)
#   8082  microservice-email     (POST /mails*, X-Api-Key required)
#   8083  microservice-memes     (gallery UI at /; uploads/votes need signing in)
#   8085  microservice-comments  (comment threads + comment votes)
#   8086  microservice-paddock   (the social hub: servers, people, events; PWA at /)
#   ----  sms / push             (internal: paddock notification channels; stub-send by default)
#   ----  image-encoder          (internal: PNG->WebP for memes; Python + Pillow)
#   8084  formula-simulator      (F1 manager: race control UI at /, SSE race broadcast)
#   8090  race-sim               (Python race module — the simulation prototype)
#   8025  Mailpit web UI         (the "inbox" for verification/reset links)
services:
  security:
    build:
      context: microservice-security
      dockerfile: security-infrastructure/Dockerfile
    ports:
      - "8080:8080"
    environment:
      MICRONAUT_ENVIRONMENTS: dev
      DB_HOST: postgres
      DB_NAME: security
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      # mails leave as events: transactional outbox -> Kafka -> microservice-email
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # links as they appear in the mails: the verify link opens the gallery UI, which POSTs the
      # token to /verify-email (a bare GET on the API would be 405 — and side effects on GET invite
      # mail-client prefetchers to consume tokens). No reset UI yet, so that link stays raw.
      VERIFY_LINK_BASE: http://localhost:8083/?verify=
      RESET_LINK_BASE: http://localhost:8080/reset-password?token=
      # the per-IP registration throttle (default 5/15min) would trip on the smoke test, which
      # registers a handful of accounts from one host in minutes — keep the guard on, but roomy
      SECURITY_REGISTRATION_MAX_PER_WINDOW: "100"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  email:
    build:
      context: microservice-email
    ports:
      - "8082:8080"
    environment:
      MAIL_API_KEY: ${MAIL_API_KEY:-local-dev-key}
      QUARKUS_MAILER_HOST: mailpit
      QUARKUS_MAILER_PORT: "1025"
      QUARKUS_MAILER_MOCK: "false"
      # the prod profile defaults to STARTTLS=REQUIRED (real submission endpoints); Mailpit
      # speaks plain SMTP only, so the local stack opts out explicitly
      MAIL_SMTP_START_TLS: DISABLED
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - mailpit
      - kafka

  memes:
    build:
      context: microservice-memes
    ports:
      - "8083:8083"
    environment:
      # writes require a bearer token that security confirms; reads (and the UI at :8083) are public
      SECURITY_URL: http://security:8080
      # the gallery is durable: metadata and image bytes in its own Postgres
      DB_URL: jdbc:postgresql://memes-postgres:5432/memes
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      # account-deletion saga (memes axis) + MEME_DELETED announcements for the comments service
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      # smaller WebP to clients that accept it; if the encoder is down, PNG is still served
      IMAGE_ENCODER_URL: http://image-encoder:8087
    depends_on:
      memes-postgres:
        condition: service_healthy
      security:
        condition: service_started
      kafka:
        condition: service_started

  image-encoder:
    build:
      context: microservice-image
    # internal only — memes calls it; not published to the host

  memes-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: memes
    volumes:
      - memes_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memes"]
      interval: 3s
      timeout: 3s
      retries: 15

  comments:
    build:
      context: microservice-comments
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://comments-postgres:5432/comments
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SECURITY_URL: http://security:8080
      MEMES_URL: http://memes:8083
      # account-deletion saga (comments axis) + the MEME_DELETED thread cascade
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
    depends_on:
      comments-postgres:
        condition: service_healthy
      security:
        condition: service_started
      kafka:
        condition: service_started

  comments-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: comments
    volumes:
      - comments_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comments"]
      interval: 3s
      timeout: 3s
      retries: 15

  paddock:
    build:
      context: microservice-paddock
    ports:
      - "8086:8086"
    environment:
      # the social hub: your servers, their live campaign state, upcoming events (PWA at :8086)
      DB_URL: jdbc:postgresql://paddock-postgres:5432/paddock
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SECURITY_URL: http://security:8080
      # notification channels — each its own service; a blank URL disables that channel.
      # email listens on 8080 inside the network (8082 is only the host-published port)
      EMAIL_URL: http://email:8080
      EMAIL_API_KEY: ${MAIL_API_KEY:-local-dev-key}
      SMS_URL: http://sms:8088
      PUSH_URL: http://push:8089
    depends_on:
      paddock-postgres:
        condition: service_healthy
      security:
        condition: service_started
      sms:
        condition: service_started
      push:
        condition: service_started

  sms:
    build:
      context: microservice-sms
    # internal only — the paddock fans out to it; stub-sends unless SMS_PROVIDER is set

  push:
    build:
      context: microservice-push
    # internal only — the paddock fans out to it; stub-sends unless PUSH_PROVIDER is set

  paddock-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: paddock
    volumes:
      - paddock_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paddock"]
      interval: 3s
      timeout: 3s
      retries: 15

  formula:
    build:
      context: formula-simulator
    ports:
      - "8084:8084"
    environment:
      RACE_SIM_URL: http://race-sim:8090
      # game actions (start race, orders, R&D, era, homologate) require a security-confirmed token
      SECURITY_URL: http://security:8080
      # durable game state (seasons, standings, developed cars) survives restarts
      DB_URL: jdbc:postgresql://formula-postgres:5432/formula
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    depends_on:
      race-sim:
        condition: service_started
      security:
        condition: service_started
      formula-postgres:
        condition: service_healthy

  formula-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: formula
    volumes:
      - formula_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d formula"]
      interval: 3s
      timeout: 3s
      retries: 15

  race-sim:
    build:
      # repo-root context: the image also ships tracks/ (incident replays draw from it)
      context: formula-simulator
      dockerfile: sim/race/Dockerfile
    ports:
      - "8090:8090"

  kafka:
    # single-node KRaft — the event backbone (mail requests, the deletion saga, thread cascades)
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"   # web UI; SMTP (1025) stays internal

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: security
    volumes:
      - security_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d security"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  security_pgdata:
  memes_pgdata:
  paddock_pgdata:
  comments_pgdata:
  formula_pgdata:

name: CI

# The workspace is a pure aggregator: the sub-projects live in their own repos (gitignored here).
# So CI mirrors exactly what a developer does locally — check each sub-repo out into its module
# directory, then let the reactor build and test everything in dependency order with one command.
# The reactor resolves the inter-project SNAPSHOTs from itself, so no publishing step is needed.
#
# The sub-repos are checked out with REPO_PAT — a fine-grained PAT with Contents:read on the
# sub-repos — because some (formula-simulator, paddock) are private and the default GITHUB_TOKEN
# only reads this repo. Set it as a repository secret named REPO_PAT.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  reactor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace (aggregator)
        uses: actions/checkout@v4

      # The 14 aggregated sub-repos, each into the directory the aggregator pom expects.
      # Pinned to main; a sub-repo feature branch is validated in its own repo's checks.
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/adjustable-clock
          path: adjustable-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/infrastructure-micronaut-clock
          path: infrastructure-micronaut-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/voting
          path: voting
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/test-starter
          path: test-starter
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/libs   # the constraint lib lives in repo "libs"
          path: constraint
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/config
          path: config
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/email
          path: email
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/password
          path: password
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-security
          path: microservice-security
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-email
          path: microservice-email
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-memes
          path: microservice-memes
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-comments
          path: microservice-comments
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/formula-simulator
          path: formula-simulator
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-paddock
          path: microservice-paddock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-user-collections
          path: microservice-user-collections
          token: ${{ secrets.REPO_PAT }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Docker is present on ubuntu-latest, so the Testcontainers tests (memes' MinIO round-trip)
      # run rather than skip.
      - name: Build and test the whole reactor
        run: ./mvnw -B --no-transfer-progress clean install

  # The third entry point in CI: the SAME Gherkin specs, driven through a real browser
  # (cucumber-js + Playwright) against the security service and its React UI. Only the modules
  # the security jar needs are built (-am closure), tests skipped — the reactor job owns those.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace (aggregator)
        uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/adjustable-clock
          path: adjustable-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/infrastructure-micronaut-clock
          path: infrastructure-micronaut-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/voting
          path: voting
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/test-starter
          path: test-starter
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/libs   # the constraint lib lives in repo "libs"
          path: constraint
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/config
          path: config
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/email
          path: email
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/password
          path: password
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-security
          path: microservice-security
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-email
          path: microservice-email
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-memes
          path: microservice-memes
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-comments
          path: microservice-comments
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/formula-simulator
          path: formula-simulator
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-paddock
          path: microservice-paddock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-user-collections
          path: microservice-user-collections
          token: ${{ secrets.REPO_PAT }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build the service jars (deps closure, no tests)
        run: ./mvnw -B -q --no-transfer-progress -pl microservice-security/security-infrastructure,microservice-memes/memes-infrastructure,microservice-comments -am package -DskipTests

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            microservice-security/security-ui/package-lock.json
            microservice-memes/memes-ui/package-lock.json
      - name: Install UI dependencies
        run: npm ci
        working-directory: microservice-security/security-ui
      - name: Install the Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: microservice-security/security-ui
      - name: Drive the shared specs through the browser (security-ui)
        run: ./run-e2e.sh
        working-directory: microservice-security/security-ui
      - name: Install gallery UI dependencies
        run: npm ci
        working-directory: microservice-memes/memes-ui
      - name: Drive the gallery through the browser (memes-ui)
        run: ./run-e2e.sh
        working-directory: microservice-memes/memes-ui
      - name: Upload service/UI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: /tmp/*-ui-e2e-*.log

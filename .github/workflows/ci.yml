name: CI

# The SHARED KERNEL workspace: identity + channels + every shared library. A pure aggregator —
# the sub-projects live in their own repos (gitignored here), so CI mirrors what a developer
# does locally: check each sub-repo out into its module directory, then let the reactor build
# and test everything in dependency order with one command.
#
# The two PRODUCTS have their own workspaces and CIs (workspace-portal, workspace-formula);
# they consume this kernel through ~/.m2, so nothing product-flavoured builds here.
#
# The sub-repos are checked out with REPO_PAT — a fine-grained PAT with Contents:read on the
# sub-repos — because some are private and the default GITHUB_TOKEN only reads this repo.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  reactor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace (aggregator)
        uses: actions/checkout@v4

      # The 11 aggregated sub-repos, each into the directory the aggregator pom expects.
      # Pinned to main; a sub-repo feature branch is validated in its own repo's checks.
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/adjustable-clock
          path: adjustable-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/infrastructure-micronaut-clock
          path: infrastructure-micronaut-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/voting
          path: voting
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/offline-jwt
          path: offline-jwt
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/test-starter
          path: test-starter
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/libs   # the constraint lib lives in repo "libs"
          path: constraint
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/config
          path: config
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/email
          path: email
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/password
          path: password
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-security
          path: microservice-security
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-email
          path: microservice-email
          token: ${{ secrets.REPO_PAT }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test the shared kernel
        run: ./mvnw -B --no-transfer-progress clean install

  # The same Gherkin specs, driven through a real browser (cucumber-js + Playwright) against
  # the security service and its React UI. Only the modules the security jar needs are built
  # (-am closure), tests skipped — the reactor job owns those.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace (aggregator)
        uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/adjustable-clock
          path: adjustable-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/infrastructure-micronaut-clock
          path: infrastructure-micronaut-clock
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/voting
          path: voting
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/offline-jwt
          path: offline-jwt
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/test-starter
          path: test-starter
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/libs   # the constraint lib lives in repo "libs"
          path: constraint
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/config
          path: config
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/email
          path: email
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/password
          path: password
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-security
          path: microservice-security
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: jrobertgardzinski/microservice-email
          path: microservice-email
          token: ${{ secrets.REPO_PAT }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build the security jar (deps closure, no tests)
        run: ./mvnw -B -q --no-transfer-progress -pl microservice-security/security-infrastructure -am package -DskipTests

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: microservice-security/security-ui/package-lock.json
      - name: Install UI dependencies
        run: npm ci
        working-directory: microservice-security/security-ui
      - name: Install the Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: microservice-security/security-ui
      - name: Drive the shared specs through the browser (security-ui)
        run: ./run-e2e.sh
        working-directory: microservice-security/security-ui
      - name: Upload service/UI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: /tmp/*-e2e-*.log

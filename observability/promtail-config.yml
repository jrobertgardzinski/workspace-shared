# Ships every compose container's stdout/stderr to Loki, discovered through the Docker socket —
# no per-service logging config, no code change. Each stream is labelled with its compose service
# and container name, so Grafana can filter to one service and grep the cid across all of them.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # the compose service name (security, memes, email, ...) — the primary filter label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # the concrete container name, for when several replicas share a service
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # only this stack's containers (compose stamps the project label)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: security
        action: keep

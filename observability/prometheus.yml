# The stack's metrics scrape (see docker-compose.yml: prometheus/grafana/cadvisor/node-exporter).
# Today's targets need NO code changes: cAdvisor sees every container, node-exporter the host.
# Per-service /metrics endpoints join here as the sub-repos grow them (workspace todo.md).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # --- the services' own /metrics, as the sub-repos grow them (workspace todo.md, etap 2)
  - job_name: security
    metrics_path: /prometheus
    static_configs:
      - targets: ["security:8080"]

  - job_name: race-sim
    static_configs:
      - targets: ["race-sim:8090"]

  - job_name: email
    metrics_path: /q/metrics
    static_configs:
      - targets: ["email:8080"]

  - job_name: memes
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["memes:8083"]

  - job_name: comments
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["comments:8085"]

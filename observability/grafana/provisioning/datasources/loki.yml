apiVersion: 1
datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      # every service prints [trace=<id>] (the OTel agent feeds trace_id into the MDC); this
      # derived field turns it into a click-through to the span waterfall in Tempo — the last
      # stitch between the logs pillar and the traces pillar.
      derivedFields:
        - name: trace
          matcherRegex: 'trace=([0-9a-f]{16,32})'
          datasourceUid: tempo
          url: '$${__value.raw}'
          urlDisplayLabel: 'Trace w Tempo'

# Single-binary Loki for the dev stack: filesystem storage, no auth, no ring — just enough to
# make every container's logs searchable in Grafana by the correlation id (cid) they already print.
auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 168h   # a week is plenty for a dev stack

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true

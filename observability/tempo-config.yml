# Single-binary Tempo for the dev stack: receives OTLP from the OpenTelemetry Java agents attached
# to the JVM services, stores traces on local disk, serves them to Grafana. Just enough to see a
# request's span waterfall across services — no object store, no metrics generator.
server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:      # services export to http://tempo:4318
        grpc:      # and/or grpc on :4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h   # a dev stack keeps traces briefly

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# The stack's alert rules — evaluated by Prometheus itself. There is no Alertmanager in the
# dev stack (nobody pages a hobbyist at 3 a.m.): firing alerts are visible on Prometheus's
# /alerts page and in Grafana (Alerting -> Alert rules, via the datasource). A production
# deployment adds Alertmanager and routes these to a channel; the rules stay the same.
groups:
  - name: stack
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} nie odpowiada Prometheusowi od 2 minut"

      - alert: Http5xxBurst
        expr: sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} sypie błędami 5xx (>0.5/s przez 5 minut)"

      - alert: HostMemoryHigh
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.92
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pamięć hosta powyżej 92% od 10 minut — stack zaraz zacznie polegać na swapie"
